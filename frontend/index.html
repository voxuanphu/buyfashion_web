 <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BuyFashionAI</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.search-box{
text-align:center;
margin:20px;
}

input{
padding:10px;
width:300px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.price{
color:#e53935;
font-weight:bold;
font-size:18px;
}

button{
background:#ff5722;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#e64a19;
}

</style>
</head>


<body>

<header>
<h1>BuyFashionAI</h1>
<p>Tìm sản phẩm thời trang đáng mua</p>
</header>


<div class="search-box">
<input id="search" placeholder="Tìm sản phẩm..." onkeyup="searchProduct()">
</div>


<div class="products" id="productGrid"></div>


<script>

const products = [

{
title:"Áo thun nam cotton basic",
price:169000,
image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab",
affiliate:"https://s.shopee.vn/8V491WRRLx"
},

{
title:"Quần jean nam form rộng",
price:299000,
image:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246",
affiliate:"#"
},

{
title:"Giày sneaker trắng",
price:389000,
image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff",
affiliate:"#"
}

]


let allProducts = products


function renderProducts(list){

const grid = document.getElementById("productGrid")

grid.innerHTML=""

list.forEach(p=>{

grid.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.title}</h3>

<p class="price">${p.price.toLocaleString()}đ</p>

<a href="${p.affiliate}" target="_blank">

<button>Mua trên Shopee</button>

</a>

</div>

`

})

}


function searchProduct(){

let keyword=document.getElementById("search").value.toLowerCase()

let filtered = allProducts.filter(p=> 
p.title.toLowerCase().includes(keyword)
)

renderProducts(filtered)

}


renderProducts(allProducts)

</script>


</body>
</html>
