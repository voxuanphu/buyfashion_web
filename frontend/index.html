 <!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuyFashionAI</title>
  <meta name="description" content="BuyFashionAI - chọn lọc sản phẩm thời trang đáng mua, gắn link Shopee affiliate." />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f6f8;
      color: #111;
    }
    header {
      background: #111;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }
    nav a {
      color: #fff;
      text-decoration: none;
    }
    .hero {
      padding: 28px 16px 10px;
      text-align: center;
    }
    .hero h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .hero p {
      margin: 0;
      color: #555;
    }
    .toolbar {
      max-width: 1100px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 12px;
      padding: 0 16px;
    }
    .toolbar input,
    .toolbar select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }
    .products {
      max-width: 1100px;
      margin: 0 auto 40px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .card-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }
    .pill {
      background: #f0f0f0;
      border-radius: 999px;
      padding: 6px 10px;
    }
    .title {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.45;
      min-height: 48px;
    }
    .price {
      font-size: 22px;
      font-weight: 800;
      color: #e53935;
    }
    .old-price {
      font-size: 14px;
      color: #888;
      text-decoration: line-through;
    }
    .shop {
      font-size: 13px;
      color: #555;
    }
    .reason {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }
    .buy-btn {
      margin-top: auto;
      display: inline-block;
      text-align: center;
      background: #ff5722;
      color: white;
      text-decoration: none;
      padding: 12px 14px;
      border-radius: 10px;
      font-weight: 700;
    }
    .buy-btn:hover {
      background: #e64a19;
    }
    .empty {
      max-width: 1100px;
      margin: 0 auto 30px;
      padding: 0 16px;
      color: #777;
      display: none;
    }
    @media (max-width: 768px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>BuyFashionAI</h1>
    <nav>
      <a href="#">Trang chủ</a>
      <a href="#products">Sản phẩm</a>
      <a href="#reviews">Review</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Chọn sản phẩm thời trang đáng mua</h2>
    <p>Danh sách sản phẩm được đọc tự động từ file dữ liệu.</p>
  </section>

  <section class="toolbar">
    <input id="searchInput" type="text" placeholder="Tìm sản phẩm..." />
    <select id="sourceFilter">
      <option value="all">Tất cả sàn</option>
      <option value="Shopee">Shopee</option>
      <option value="Lazada">Lazada</option>
      <option value="Tiki">Tiki</option>
    </select>
    <select id="categoryFilter">
      <option value="all">Tất cả danh mục</option>
      <option value="Áo nam">Áo nam</option>
      <option value="Quần">Quần</option>
      <option value="Giày">Giày</option>
      <option value="Váy nữ">Váy nữ</option>
    </select>
    <select id="sortFilter">
      <option value="score">Ưu tiên điểm AI</option>
      <option value="priceAsc">Giá tăng dần</option>
      <option value="priceDesc">Giá giảm dần</option>
      <option value="rating">Ưu tiên rating</option>
    </select>
  </section>

  <div class="empty" id="emptyState">Không có sản phẩm phù hợp.</div>
  <section class="products" id="products"></section>

  <script>
    let allProducts = [];

    const productsEl = document.getElementById("products");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const sourceFilter = document.getElementById("sourceFilter");
    const categoryFilter = document.getElementById("categoryFilter");
    const sortFilter = document.getElementById("sortFilter");

    function formatPrice(value) {
      return Number(value).toLocaleString("vi-VN") + "đ";
    }

    function createCard(item) {
      return `
        <article class="card">
          <img src="${item.image}" alt="${item.title}">
          <div class="card-body">
            <div class="meta">
              <span class="pill">${item.source}</span>
              <span class="pill">${item.category}</span>
              <span class="pill">AI ${item.score}/100</span>
            </div>

            <div class="title">${item.title}</div>

            <div>
              <div class="price">${formatPrice(item.price)}</div>
              <div class="old-price">${formatPrice(item.oldPrice)}</div>
            </div>

            <div class="shop">${item.shop} • ⭐ ${item.rating} • ${Number(item.sold).toLocaleString("vi-VN")} lượt mua</div>

            <div class="reason">${item.reason}</div>

            <a class="buy-btn" href="${item.affiliate}" target="_blank" rel="nofollow sponsored noopener">
              Mua ngay
            </a>
          </div>
        </article>
      `;
    }

    function renderProducts(list) {
      productsEl.innerHTML = list.map(createCard).join("");
      emptyState.style.display = list.length ? "none" : "block";
    }

    function applyFilters() {
      const keyword = searchInput.value.trim().toLowerCase();
      const source = sourceFilter.value;
      const category = categoryFilter.value;
      const sort = sortFilter.value;

      let filtered = allProducts.filter(item => {
        const matchKeyword =
          !keyword ||
          [item.title, item.shop, item.reason, item.category, item.source]
            .join(" ")
            .toLowerCase()
            .includes(keyword);

        const matchSource = source === "all" || item.source === source;
        const matchCategory = category === "all" || item.category === category;

        return matchKeyword && matchSource && matchCategory;
      });

      if (sort === "score") filtered.sort((a, b) => b.score - a.score);
      if (sort === "priceAsc") filtered.sort((a, b) => a.price - b.price);
      if (sort === "priceDesc") filtered.sort((a, b) => b.price - a.price);
      if (sort === "rating") filtered.sort((a, b) => b.rating - a.rating);

      renderProducts(filtered);
    }

    fetch("../data/products.json")
      .then(res => res.json())
      .then(data => {
        allProducts = data;
        applyFilters();
      })
      .catch(err => {
        console.error("Lỗi đọc products.json:", err);
        productsEl.innerHTML = "<p>Không đọc được dữ liệu sản phẩm.</p>";
      });

    searchInput.addEventListener("input", applyFilters);
    sourceFilter.addEventListener("change", applyFilters);
    categoryFilter.addEventListener("change", applyFilters);
    sortFilter.addEventListener("change", applyFilters);
  </script>
</body>
</html>
